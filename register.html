<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="register">
    <header class="page_header">
        <h1>Registration</h1>
    </header>
    <form class="card">
        <h2>Create Account</h2>
        <div class="fields">
            <label for="fullname">Full Name</label>
            <input id="fullname" name="fullname" type="text" autocomplete="name" required placeholder="Enter Your Name">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required placeholder="Enter Your email">
            <label for="university_id">University ID</label>
            <input id="university_id" name="university_id" type="text" required autocomplete="off" placeholder="Roll NUmber / Staff ID">
            <div class="form_group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required placeholder="Create Strong Password">
                <label for="confirm_password">Confirm Password</label>
                <input id="confirm_password" name="confirm_password" type="password" required placeholder="Must Match with Password">
                <small>Must match password</small>
            </div>
            <!-- <label for="role">Role</label>
            <select id="role" name="role">
                <option value="Client">Client</option>
                <option value="provider">Provider</option>
            </select> -->
            <button type="submit">Register</button>
        </div>
    </form>
    <p>Already have an account? <a href="login.html">Login</a></p>
</body>
</html>
